<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>HACKR MAX - Premium</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">


  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    html, body {
      width: 100%;
      overflow-x: hidden;
      background: radial-gradient(circle at 10% 20%, #0c1a0c, #030603);
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: #2ecc71;
      border-radius: 50%;
      opacity: 0.6;
      animation: float 15s infinite ease-in-out;
      box-shadow: 0 0 10px #2ecc71;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) translateX(0); }
      25% { transform: translateY(-100px) translateX(50px); }
      50% { transform: translateY(-200px) translateX(-30px); }
      75% { transform: translateY(-100px) translateX(70px); }
    }

    .info-badge {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(10, 20, 10, 0.75);
      backdrop-filter: blur(10px);
      padding: 10px 20px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 700;
      color: #d4ff78;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 10;
      border: 1px solid #3a6a3a;
      box-shadow: 0 0 20px #2ecc7120;
    }

    .login-container {
      width: 90%;
      max-width: 480px;
      background: rgba(10, 20, 10, 0.85);
      backdrop-filter: blur(15px);
      border: 1px solid #3a6a3a;
      border-radius: 32px;
      padding: 45px 35px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.8), 0 0 0 1px #2ecc7140, 0 0 40px #2ecc7120;
      position: relative;
      z-index: 5;
      animation: slideUp 0.8s ease forwards;
      transform: translateY(40px);
      opacity: 0;
    }

    @keyframes slideUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .login-container::before {
      content: '';
      position: absolute;
      top: -2px; left: -2px; right: -2px; bottom: -2px;
      background: linear-gradient(145deg, #2ecc71, transparent, #2ecc71);
      border-radius: 34px;
      z-index: -1;
      opacity: 0.4;
      animation: borderGlow 3s infinite alternate;
    }

    @keyframes borderGlow {
      0% { opacity: 0.3; transform: scale(1); }
      100% { opacity: 0.6; transform: scale(1.01); }
    }

    .logo-container {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo-shield {
      width: 100px;
      height: 100px;
      margin: 0 auto 20px;
      background: radial-gradient(circle, #2ecc7140, transparent);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      animation: pulse 3s infinite ease-in-out;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 30px #2ecc7140; }
      50% { transform: scale(1.05); box-shadow: 0 0 50px #2ecc7180; }
    }

    .logo-shield img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 50%;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 900;
      background: linear-gradient(145deg, #d4ff78, #a0e7a0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 2px;
      margin-bottom: 10px;
      position: relative;
    }

    h1::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 4px;
      background: linear-gradient(90deg, transparent, #2ecc71, transparent);
      border-radius: 10px;
      box-shadow: 0 0 10px #2ecc71;
    }

    .subtitle {
      color: #c0ffc0;
      font-size: 0.95rem;
      font-weight: 500;
      opacity: 0.95;
      margin-top: 15px;
    }

    .admin-note {
      background: rgba(46, 204, 113, 0.15);
      border: 1px solid #2ecc7160;
      border-radius: 16px;
      padding: 12px;
      margin: 20px 0 25px 0;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #d4ff78;
      font-weight: 600;
      box-shadow: 0 0 15px #2ecc7120;
    }

    .admin-note i { color: #2ecc71; font-size: 16px; }

    /* 2x2 Social Grid */
    .social-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 25px;
    }

    .social-btn {
      padding: 14px 10px;
      background: radial-gradient(145% 140% at 20% 20%, #2a3a2a, #0e1a0e);
      border: 1.5px solid #3a6a3a;
      border-radius: 20px;
      font-weight: 700;
      font-size: 15px;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-decoration: none;
      transition: all 0.3s ease;
      box-shadow: 0 6px 0 #081008, 0 0 15px #2ecc7120;
      position: relative;
      overflow: hidden;
    }

    .social-btn::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 0; height: 0;
      background: rgba(46, 204, 113, 0.3);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: width 0.5s, height 0.5s;
    }

    .social-btn:hover::before { width: 300px; height: 300px; }

    .social-btn:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 0 #081008, 0 0 30px #2ecc7140;
      border-color: #2ecc71;
    }

    .social-btn i {
      font-size: 18px;
      position: relative;
      z-index: 1;
    }

    .social-btn span {
      position: relative;
      z-index: 1;
    }

    .yt-icon { color: #ff0000; }
    .ig-icon { color: #e1306c; }
    .tg-icon { color: #29b6f6; }
    .wa-icon { color: #25d366; }

    .start-btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(145deg, #2ecc71, #27ae60);
      color: white;
      border: none;
      border-radius: 20px;
      font-size: 18px;
      font-weight: 900;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 8px 0 #1e8449, 0 10px 30px rgba(46, 204, 113, 0.5);
      position: relative;
      overflow: hidden;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .start-btn::before {
      content: '';
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
      transform: rotate(45deg);
      animation: shine 3s infinite;
    }

    @keyframes shine {
      0% { left: -50%; }
      100% { left: 150%; }
    }

    .start-btn:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 0 #1e8449, 0 15px 40px rgba(46, 204, 113, 0.6);
    }

    .start-btn:active {
      transform: translateY(-2px);
      box-shadow: 0 6px 0 #1e8449;
    }

    .bottom-note {
      margin-top: 20px;
      font-size: 13px;
      color: rgba(192, 255, 192, 0.7);
      text-align: center;
      font-weight: 500;
    }

    .bottom-note strong { color: #2ecc71; font-weight: 800; }

    /* Hidden password fields */
    .hidden-form { display: none; }

    .credit {
      position: absolute;
      bottom: 20px;
      left: 0;
      width: 100%;
      text-align: center;
      font-size: 14px;
      color: rgba(192, 255, 192, 0.6);
      font-weight: 600;
      z-index: 10;
    }

    @media (max-width: 640px) {
      .login-container { padding: 35px 25px; }
      h1 { font-size: 1.8rem; }
    }
  </style>
</head>

  <script>
    // Time update
    const timeEl = document.getElementById('current-time');
    const now = new Date();
    const options = { timeZone: 'Asia/Kolkata', hour: '2-digit', minute: '2-digit', hour12: true };
    timeEl.textContent = now.toLocaleTimeString('en-US', options).replace(/AM|PM/i, m => m + ' IST').toUpperCase();

    // Start button - direct submit hidden form
    function doStart() {
      document.getElementById('loginForm').submit();
    }
  </script>
