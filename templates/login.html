<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>HACKR MAX - Premium</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --bg:    #040d1a;
      --bg2:   #071428;
      --bg3:   #0a1d3a;
      --cyan:  #00e5ff;
      --cyan2: #00b4cc;
      --gold:  #ffc107;
      --text:  #e0f7ff;
      --text2: #90caf9;
      --b1:    #00e5ff22;
      --b2:    #00e5ff44;
      --shadow: 0 4px 24px #00000080;
    }

    * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }

    html, body {
      width:100%; overflow-x:hidden;
      background: var(--bg);
      color: var(--text);
      min-height:100vh;
      display:flex; justify-content:center; align-items:center;
      position:relative;
      -webkit-text-size-adjust:100%;
    }

    /* ── PARTICLES ── */
    .particles {
      position:fixed; inset:0;
      pointer-events:none; z-index:1; overflow:hidden;
    }
    .particle {
      position:absolute;
      width:3px; height:3px;
      background: var(--cyan);
      border-radius:50%;
      opacity:0.5;
      animation: float 18s infinite ease-in-out;
      box-shadow: 0 0 8px var(--cyan);
    }
    @keyframes float {
      0%,100% { transform:translateY(0) translateX(0); }
      25%      { transform:translateY(-100px) translateX(50px); }
      50%      { transform:translateY(-200px) translateX(-30px); }
      75%      { transform:translateY(-100px) translateX(70px); }
    }

    /* ── INFO BADGE ── */
    .info-badge {
      position:absolute; top:18px; right:18px;
      background: var(--bg2);
      backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
      padding:9px 18px; border-radius:50px;
      font-size:.75rem; font-weight:700;
      color: var(--text2);
      display:flex; align-items:center; gap:8px;
      z-index:10;
      border:1px solid var(--b2);
      box-shadow: 0 0 16px #00e5ff18, var(--shadow);
    }
    .info-badge i { color: var(--cyan); font-size:.75rem; }

    /* ── CARD ── */
    .login-container {
      width:92%; max-width:460px;
      background: linear-gradient(135deg, #071428f0, #0a1d3af0);
      backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
      border:1px solid var(--b2);
      border-radius:28px;
      padding:40px 32px 36px;
      box-shadow: 0 0 60px #00e5ff12, 0 20px 60px #00000090, var(--shadow);
      position:relative; z-index:5;
      animation: slideUp .7s ease forwards;
      opacity:0; transform:translateY(30px);
      overflow:hidden;
    }
    .login-container::before {
      content:'';
      position:absolute; inset:-2px;
      background: linear-gradient(135deg, #00e5ff30, transparent 50%, #00e5ff20);
      border-radius:30px; z-index:-1;
      animation: borderGlow 3s infinite alternate;
    }
    @keyframes slideUp { to { opacity:1; transform:translateY(0); } }
    @keyframes borderGlow {
      0%   { opacity:.4; }
      100% { opacity:.8; }
    }

    /* ── TOP GLOW ── */
    .login-container::after {
      content:'';
      position:absolute; top:-60px; left:50%;
      transform:translateX(-50%);
      width:260px; height:120px;
      background: radial-gradient(ellipse, #00e5ff18, transparent 70%);
      pointer-events:none;
    }

    /* ── LOGO ── */
    .logo-wrap {
      text-align:center; margin-bottom:28px;
    }
    .logo-shield {
      width:90px; height:90px;
      margin:0 auto 16px;
      background: radial-gradient(circle, #00e5ff18, transparent);
      border-radius:50%;
      border:2px solid var(--b2);
      display:flex; justify-content:center; align-items:center;
      animation: pulse 3s infinite ease-in-out;
      box-shadow: 0 0 30px #00e5ff18;
    }
    .logo-shield img {
      width:120%; height:120%;
      object-fit:contain; border-radius:50%;
    }
    @keyframes pulse {
      0%,100% { box-shadow:0 0 20px #00e5ff20; transform:scale(1); }
      50%      { box-shadow:0 0 40px #00e5ff40; transform:scale(1.04); }
    }
    h1 {
      font-family:'Rajdhani',sans-serif;
      font-size:2rem; font-weight:700;
      background:linear-gradient(135deg, var(--cyan), #82b1ff);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      background-clip:text;
      letter-spacing:2px; margin-bottom:6px;
    }
    .subtitle {
      color: var(--text2); font-size:.82rem; font-weight:500;
    }

    /* ── ADMIN NOTE ── */
    .admin-note {
      background: #00e5ff0d;
      border:1px solid var(--b2);
      border-radius:14px;
      padding:11px 14px;
      margin:20px 0 24px;
      font-size:.78rem; font-weight:700;
      display:flex; align-items:center; justify-content:center;
      gap:8px; color: var(--cyan2);
      box-shadow: 0 0 12px #00e5ff10;
    }
    .admin-note i { color:var(--cyan); }

    /* ── SOCIAL GRID ── */
    .social-grid {
      display:grid; grid-template-columns:1fr 1fr;
      gap:12px; margin-bottom:24px;
    }
    .social-btn {
      padding:13px 10px;
      background: var(--bg3);
      border:1px solid var(--b2);
      border-bottom:3px solid #02080f;
      border-radius:16px;
      font-weight:700; font-size:.82rem;
      color: var(--text);
      display:flex; align-items:center; justify-content:center;
      gap:8px;
      text-decoration:none;
      transition:.2s;
      position:relative; overflow:hidden;
    }
    .social-btn::before {
      content:'';
      position:absolute; top:50%; left:50%;
      width:0; height:0;
      background: rgba(0,229,255,.12);
      border-radius:50%;
      transform:translate(-50%,-50%);
      transition:width .4s, height .4s;
    }
    .social-btn:hover::before { width:260px; height:260px; }
    .social-btn:hover {
      border-color: var(--cyan);
      box-shadow: 0 0 16px #00e5ff30;
      transform:translateY(-3px);
    }
    .social-btn svg, .social-btn i { position:relative; z-index:1; }
    .social-btn span { position:relative; z-index:1; }

    /* ── START BUTTON ── */
    .start-btn {
      width:100%;
      padding:16px;
      background: linear-gradient(135deg, #0077b6, #023e8a);
      color:white; border:none;
      border-radius:50px;
      font-size:1rem; font-weight:800;
      cursor:pointer; transition:.2s;
      border-bottom:4px solid #011f4b;
      box-shadow: 0 0 20px #0096c740;
      letter-spacing:2px; text-transform:uppercase;
      position:relative; overflow:hidden;
      display:flex; align-items:center; justify-content:center; gap:10px;
    }
    .start-btn::before {
      content:'';
      position:absolute; top:-50%; left:-60%;
      width:40%; height:200%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.2), transparent);
      transform:skewX(-20deg);
      animation:shine 3s infinite;
    }
    @keyframes shine {
      0%   { left:-60%; }
      100% { left:160%; }
    }
    .start-btn:hover {
      background: linear-gradient(135deg, #0096c7, #0077b6);
      box-shadow: 0 0 30px #00e5ff50;
      transform:translateY(-2px);
    }
    .start-btn:active { transform:translateY(0); }

    /* ── BOTTOM NOTE ── */
    .bottom-note {
      margin-top:18px;
      font-size:.72rem; color: var(--text2);
      text-align:center; font-weight:500;
    }
    .bottom-note strong { color:var(--cyan); font-weight:800; }

    .hidden-form { display:none; }

    /* ── CREDIT ── */
    .credit {
      position:absolute; bottom:16px; left:0; width:100%;
      text-align:center; font-size:.7rem;
      color:#1e3a5a; font-weight:600; z-index:10;
    }

    @media(max-width:480px){
      .login-container { padding:32px 22px 28px; }
      h1 { font-size:1.7rem; }
    }
  </style>
</head>
